# Proxy Authentik flow/static/session paths to auth domain.
# Used so requests to opencode.zacariahheim.com/if/, /static/, /Lw/, /outpost.goauthentik.io/
# are served by Authentik (forward-auth redirects to flow on app host; this fixes 404s).
server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass https://auth.zacariahheim.com;
        proxy_set_header Host auth.zacariahheim.com;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
    }
}
