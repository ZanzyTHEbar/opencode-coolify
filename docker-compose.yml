# OpenCode web server — Coolify deployment (same pattern as opencloud-compose).
# Traefik labels are generated by Coolify from domain assignments in the UI.
# Do NOT add Traefik labels here — they conflict with Coolify's. Assign the domain
# (e.g. https://opencode.zacariahheim.com:4096) in Coolify and use the same
# Authentik Proxy protection you use for other apps (e.g. OpenCloud).

services:
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    command: web --hostname 0.0.0.0 --port 4096
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config:/root/.config/opencode:rw
      - opencode_storage:/root/.local/share/opencode/storage
      - opencode_mem:/root/.opencode-mem
      - /mnt/shared/common:/workspaces:rw
    expose:
      - "4096"
      - "4747"
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  opencode_storage:
  opencode_mem:
