# OpenCode web server — standalone (Coolify destination_uuid not set).
# Deploy on cool-res; Traefik (coolify-proxy) discovers via Docker labels.
# Authentik: Proxy Provider "OpenCode Proxy" + forward auth middleware below.

services:
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: opencode-web
    command: web --hostname 0.0.0.0 --port 4096
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config:/root/.config/opencode:rw
      - opencode_storage:/root/.local/share/opencode/storage
      - opencode_mem:/root/.opencode-mem
      - /mnt/shared/common:/workspaces:rw
    ports:
      - "4096:4096"
      - "4747:4747"
    restart: unless-stopped
    labels:
      # Forward auth: unauthenticated requests go to Authentik
      - traefik.http.middlewares.opencode-auth.forwardauth.address=https://auth.zacariahheim.com/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.opencode-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.opencode-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-*
      # Higher-priority router: Authentik flow/outpost paths on app domain → Authentik (fixes MIME/404 for flow assets)
      - traefik.http.routers.opencode-authentik.rule=Host(`opencode.zacariahheim.com`) && (PathPrefix(`/outpost.goauthentik.io/`) || PathPrefix(`/application/`) || PathPrefix(`/static/`))
      - traefik.http.routers.opencode-authentik.priority=15
      - traefik.http.routers.opencode-authentik.service=opencode-authentik-backend
      - traefik.http.services.opencode-authentik-backend.loadbalancer.servers[0].url=https://auth.zacariahheim.com
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  opencode_storage:
  opencode_mem:
