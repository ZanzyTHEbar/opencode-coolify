# OpenCode web server — Coolify + Authentik (forward auth).
# Assign domain in Coolify (e.g. https://opencode.zacariahheim.com:4096).
# When using Authentik, leave OPENCODE_SERVER_PASSWORD unset so the app doesn't
# prompt for basic auth; Authentik protects at the proxy.
#
# Authentik path proxy: forward-auth redirects to the flow on the app host;
# /if/, /static/, /Lw/, /outpost.goauthentik.io/ must be served by Authentik.
# This service proxies those paths to auth.zacariahheim.com so the flow and
# assets load instead of 404. Set OPENCODE_DOMAIN to match your Coolify-assigned domain (no port).

services:
  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    command: web --hostname 0.0.0.0 --port 4096
    working_dir: /workspaces
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./config:/root/.config/opencode:rw
      - opencode_storage:/root/.local/share/opencode/storage
      - opencode_mem:/root/.opencode-mem
      - /mnt/shared/common:/workspaces:rw
    expose:
      - "4096"
      - "4747"
    restart: unless-stopped
    labels:
      - traefik.http.middlewares.opencode-auth.forwardauth.address=https://auth.zacariahheim.com/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.opencode-auth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.opencode-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-*
      - coolify.traefik.middlewares=opencode-auth@docker
    networks:
      - coolify

  # Proxies Authentik flow/static/session paths so they are served from auth domain (fixes 404s).
  authentik-path-proxy:
    image: nginx:alpine
    volumes:
      - ./authentik-path-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.services.authentik-path-proxy.loadbalancer.server.port=8080
      # Match OpenCode host + Authentik paths; higher priority so these paths hit Authentik.
      - traefik.http.routers.opencode-authentik-paths.rule=Host(`${OPENCODE_DOMAIN:-opencode.zacariahheim.com}`) && (PathPrefix(`/if/`) || PathPrefix(`/static/`) || PathPrefix(`/Lw/`) || PathPrefix(`/outpost.goauthentik.io/`))
      - traefik.http.routers.opencode-authentik-paths.priority=100
      - traefik.http.routers.opencode-authentik-paths.service=authentik-path-proxy
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  opencode_storage:
  opencode_mem:
